name: SSH PR preview

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number 
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ssh-pr-preview-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || format('refs/pull/{0}/head', inputs.pr_number) }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip markdown pymdown-extensions imagesize

      - name: Resolve preview settings
        id: preview
        env:
          PREVIEW_BASE_URL: ${{ secrets.PREVIEW_BASE_URL }}
          PREVIEW_TARGET_ROOT: ${{ secrets.PREVIEW_TARGET_ROOT }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          preview_path="pr-${PR_NUMBER}"
          base_url="${PREVIEW_BASE_URL:-https://preview.polandchildabduction.pl}"
          base_url="${base_url%/}"
          remote_root="${PREVIEW_TARGET_ROOT:-public_html/preview}"
          remote_root="${remote_root%/}"
          echo "path=$preview_path" >> "$GITHUB_OUTPUT"
          echo "url=${base_url}/${preview_path}/" >> "$GITHUB_OUTPUT"
          echo "url_prefix=/${preview_path}" >> "$GITHUB_OUTPUT"
          echo "remote_target=${remote_root}/${preview_path}" >> "$GITHUB_OUTPUT"

      - name: Build PR preview path
        run: |
          set -euo pipefail
          rm -rf pages-preview
          python tools/dev_build_and_publish.py \
            --root . \
            --url-prefix "${{ steps.preview.outputs.url_prefix }}" \
            --dest "pages-preview/${{ steps.preview.outputs.path }}" \
            --rewrite-root-assets

      - name: Finalize preview assets
        run: python tools/pages_preview_finalize.py --preview-dir "pages-preview/${{ steps.preview.outputs.path }}" --url-prefix "${{ steps.preview.outputs.url_prefix }}"

      - name: Deploy preview over SSH
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345
        with:
          host: ${{ secrets.PREVIEW_SSH_HOST }}
          username: ${{ secrets.PREVIEW_SSH_USERNAME }}
          port: ${{ secrets.PREVIEW_SSH_PORT || 22 }}
          key: ${{ secrets.PREVIEW_SSH_KEY }}
          rm: true
          source: pages-preview/${{ steps.preview.outputs.path }}/**
          target: ${{ steps.preview.outputs.remote_target }}
          strip_components: 2

      - name: Notify preview
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        run: |
          set -euo pipefail
          marker='<!-- pca-pr-preview -->'
          body="${marker}
          Preview URL: ${PREVIEW_URL}

          Localized roots:
          - ${PREVIEW_URL}en/
          - ${PREVIEW_URL}fr/
          - ${PREVIEW_URL}hr/"
          existing_id=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
            --jq ".[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"${marker}\"))) | .id" \
            | tail -n 1)
          if [ -n "$existing_id" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" -f body="$body" >/dev/null
          else
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$body"
          fi

      - name: Summarize preview
        run: |
          preview_url="${{ steps.preview.outputs.url }}"
          echo "Preview URL: $preview_url" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${preview_url}en/" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${preview_url}fr/" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${preview_url}hr/" >> "$GITHUB_STEP_SUMMARY"
