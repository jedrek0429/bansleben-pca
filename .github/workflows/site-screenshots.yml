name: PCA Preview Screenshots

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: false
        type: string
      path:
        description: Site path to capture
        required: false
        default: /en/
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  preview-screenshots:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright Chromium
        run: npx --yes playwright@latest install --with-deps chromium

      - name: Build screenshot preview
        run: |
          python tools/build.py preview \
            --root . \
            --to ../site-screenshot-preview \
            --prefix ""

      - name: Capture desktop and mobile screenshots
        env:
          SCREENSHOT_PATH: ${{ inputs.path || '/en/' }}
        run: |
          set -euo pipefail
          mkdir -p screenshots
          python -m http.server 4173 --directory ../site-screenshot-preview > /tmp/pca-site-server.log 2>&1 &
          echo $! > /tmp/pca-site-server.pid
          curl --retry 20 --retry-connrefused --retry-delay 1 --fail "http://127.0.0.1:4173${SCREENSHOT_PATH}" >/dev/null
          npx --yes playwright@latest screenshot --browser=chromium --viewport-size=1440,1000 --full-page "http://127.0.0.1:4173${SCREENSHOT_PATH}" screenshots/desktop.png
          npx --yes playwright@latest screenshot --browser=chromium --viewport-size=390,844 --full-page "http://127.0.0.1:4173${SCREENSHOT_PATH}" screenshots/mobile.png

      - name: Upload screenshots artifact
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pca-preview-screenshots
          path: screenshots
          if-no-files-found: ignore

      - name: Publish screenshots branch
        if: always() && (github.event_name == 'pull_request' || inputs.pr_number != '')
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: python tools/publish_screenshots_branch.py --pr-number "$PR_NUMBER"

      - name: Comment screenshots on pull request
        if: always() && (github.event_name == 'pull_request' || inputs.pr_number != '')
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          SCREENSHOT_PATH: ${{ inputs.path || '/en/' }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        with:
          script: |
            const marker = '<!-- pca-site-screenshots -->';
            const prNumber = Number(process.env.PR_NUMBER);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = process.env.ARTIFACT_URL || runUrl;
            const rawBase = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/site-screenshots/pr-${prNumber}`;
            const cache = `${context.runId}-${process.env.GITHUB_RUN_ATTEMPT}`;
            const desktopUrl = `${rawBase}/desktop.png?cache=${cache}`;
            const mobileUrl = `${rawBase}/mobile.png?cache=${cache}`;
            const branchUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/tree/site-screenshots/pr-${prNumber}`;
            const body = `${marker}\nSite screenshots for ${process.env.SCREENSHOT_PATH} are ready.\n\n<a href="${desktopUrl}"><img src="${desktopUrl}" alt="Desktop screenshot" width="320"></a>\n\n<a href="${mobileUrl}"><img src="${mobileUrl}" alt="Mobile screenshot" width="160"></a>\n\nLinks: [screenshot branch](${branchUrl}) - [artifact download](${artifactUrl})`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.user.type === 'Bot' && comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
