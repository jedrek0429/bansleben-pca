name: GitHub Pages PR preview fixed

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-preview-fixed-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.preview.outputs.url }}

    steps:
      - name: Check out PR commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip markdown pymdown-extensions imagesize

      - name: Resolve preview URL
        id: preview
        run: |
          preview_path="pr-${{ github.event.pull_request.number }}"
          preview_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${preview_path}/"
          url_prefix="/${{ github.event.repository.name }}/${preview_path}"
          echo "path=$preview_path" >> "$GITHUB_OUTPUT"
          echo "url=$preview_url" >> "$GITHUB_OUTPUT"
          echo "url_prefix=$url_prefix" >> "$GITHUB_OUTPUT"

      - name: Build PR preview path
        run: |
          rm -rf pages-preview
          python tools/dev_build_and_publish.py \
            --root . \
            --url-prefix "${{ steps.preview.outputs.url_prefix }}" \
            --dest "pages-preview/${{ steps.preview.outputs.path }}" \
            --rewrite-root-assets

      - name: Finalize preview assets
        run: python tools/pages_preview_finalize.py --preview-dir "pages-preview/${{ steps.preview.outputs.path }}" --url-prefix "${{ steps.preview.outputs.url_prefix }}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-preview

      - name: Deploy GitHub Pages preview
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Summarize preview
        run: |
          preview_url="${{ steps.preview.outputs.url }}"
          echo "Preview URL: $preview_url" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${preview_url}en/" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${preview_url}fr/" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${preview_url}hr/" >> "$GITHUB_STEP_SUMMARY"
