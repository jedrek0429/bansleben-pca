name: GitHub Pages PR preview fixed

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: pages-preview-fixed-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip markdown pymdown-extensions imagesize

      - name: Resolve preview URL
        id: preview
        run: |
          preview_path="pr-${{ github.event.pull_request.number }}"
          preview_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${preview_path}/"
          url_prefix="/${{ github.event.repository.name }}/${preview_path}"
          echo "path=$preview_path" >> "$GITHUB_OUTPUT"
          echo "url=$preview_url" >> "$GITHUB_OUTPUT"
          echo "url_prefix=$url_prefix" >> "$GITHUB_OUTPUT"

      - name: Build PR preview path
        run: |
          rm -rf pages-preview
          python tools/dev_build_and_publish.py \
            --root . \
            --url-prefix "${{ steps.preview.outputs.url_prefix }}" \
            --dest "pages-preview/${{ steps.preview.outputs.path }}" \
            --rewrite-root-assets

      - name: Finalize preview assets
        run: python tools/pages_preview_finalize.py --preview-dir "pages-preview/${{ steps.preview.outputs.path }}" --url-prefix "${{ steps.preview.outputs.url_prefix }}"

      - name: Publish preview to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          preview_path="${{ steps.preview.outputs.path }}"
          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf gh-pages-worktree
          if git clone --depth 1 --branch gh-pages "$repo_url" gh-pages-worktree; then
            echo "Updating existing gh-pages branch"
          else
            echo "Creating gh-pages branch"
            git init gh-pages-worktree
            git -C gh-pages-worktree checkout -b gh-pages
            git -C gh-pages-worktree remote add origin "$repo_url"
          fi

          rm -rf "gh-pages-worktree/${preview_path}"
          mkdir -p "gh-pages-worktree/${preview_path}"
          cp -a "pages-preview/${preview_path}/." "gh-pages-worktree/${preview_path}/"
          touch gh-pages-worktree/.nojekyll

          git -C gh-pages-worktree add -A
          if git -C gh-pages-worktree diff --cached --quiet; then
            echo "No preview changes to publish."
          else
            git -C gh-pages-worktree commit -m "Publish preview ${preview_path} for ${GITHUB_SHA}"
            git -C gh-pages-worktree push origin gh-pages
          fi

      - name: Summarize preview
        run: |
          preview_url="${{ steps.preview.outputs.url }}"
          {
            echo '## Live GitHub Pages PR preview'
            echo ''
            echo "Preview URL: $preview_url"
            echo ''
            echo 'Localized roots:'
            echo "- ${preview_url}en/"
            echo "- ${preview_url}fr/"
            echo "- ${preview_url}hr/"
          } >> "$GITHUB_STEP_SUMMARY"
