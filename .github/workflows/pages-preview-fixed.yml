name: SSH PR preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ssh-pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip markdown pymdown-extensions imagesize

      - name: Resolve preview URL
        id: preview
        env:
          PREVIEW_BASE_URL: ${{ secrets.PREVIEW_BASE_URL }}
        run: |
          set -euo pipefail
          preview_path="pr-${{ github.event.pull_request.number }}"
          base_url="${PREVIEW_BASE_URL:-https://preview.polandchildabduction.pl}"
          base_url="${base_url%/}"
          preview_url="${base_url}/${preview_path}/"
          url_prefix="/${preview_path}"
          echo "path=$preview_path" >> "$GITHUB_OUTPUT"
          echo "url=$preview_url" >> "$GITHUB_OUTPUT"
          echo "url_prefix=$url_prefix" >> "$GITHUB_OUTPUT"

      - name: Build PR preview path
        run: |
          set -euo pipefail
          rm -rf pages-preview
          python tools/dev_build_and_publish.py \
            --root . \
            --url-prefix "${{ steps.preview.outputs.url_prefix }}" \
            --dest "pages-preview/${{ steps.preview.outputs.path }}" \
            --rewrite-root-assets

      - name: Finalize preview assets
        run: python tools/pages_preview_finalize.py --preview-dir "pages-preview/${{ steps.preview.outputs.path }}" --url-prefix "${{ steps.preview.outputs.url_prefix }}"

      - name: Deploy preview over SSH
        env:
          PREVIEW_SSH_HOST: ${{ secrets.PREVIEW_SSH_HOST }}
          PREVIEW_SSH_PORT: ${{ secrets.PREVIEW_SSH_PORT }}
          PREVIEW_SSH_USERNAME: ${{ secrets.PREVIEW_SSH_USERNAME }}
          PREVIEW_SSH_KEY: ${{ secrets.PREVIEW_SSH_KEY }}
          PREVIEW_TARGET_ROOT: ${{ secrets.PREVIEW_TARGET_ROOT }}
        run: |
          set -euo pipefail

          required_missing=0
          for name in PREVIEW_SSH_HOST PREVIEW_SSH_USERNAME PREVIEW_SSH_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: ${name}" >&2
              required_missing=1
            fi
          done
          if [ "$required_missing" -ne 0 ]; then
            exit 1
          fi

          preview_path="${{ steps.preview.outputs.path }}"
          local_dir="pages-preview/${preview_path}"
          ssh_port="${PREVIEW_SSH_PORT:-22}"
          remote_base="${PREVIEW_TARGET_ROOT:-public_html/preview}"
          if [[ "$remote_base" == ~/* ]]; then
            remote_base="\$HOME/${remote_base#~/}"
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PREVIEW_SSH_KEY" > ~/.ssh/pca-preview-key
          chmod 600 ~/.ssh/pca-preview-key
          ssh-keyscan -p "$ssh_port" "$PREVIEW_SSH_HOST" >> ~/.ssh/known_hosts

          ssh_cmd=(ssh -i ~/.ssh/pca-preview-key -p "$ssh_port" -o IdentitiesOnly=yes)
          rsync_ssh="ssh -i ~/.ssh/pca-preview-key -p ${ssh_port} -o IdentitiesOnly=yes"

          remote_base_resolved=$("${ssh_cmd[@]}" "${PREVIEW_SSH_USERNAME}@${PREVIEW_SSH_HOST}" "mkdir -p \"${remote_base}\" && cd \"${remote_base}\" && pwd")
          remote_dir="${remote_base_resolved%/}/${preview_path}"

          "${ssh_cmd[@]}" "${PREVIEW_SSH_USERNAME}@${PREVIEW_SSH_HOST}" "mkdir -p \"${remote_dir}\""
          rsync -az --delete -e "$rsync_ssh" "${local_dir}/" "${PREVIEW_SSH_USERNAME}@${PREVIEW_SSH_HOST}:${remote_dir}/"

      - name: Notify preview
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        run: |
          set -euo pipefail
          marker='<!-- pca-pr-preview -->'
          body="${marker}
          Preview URL: ${PREVIEW_URL}

          Localized roots:
          - ${PREVIEW_URL}en/
          - ${PREVIEW_URL}fr/
          - ${PREVIEW_URL}hr/"

          existing_id=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
            --jq ".[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"${marker}\"))) | .id" \
            | tail -n 1)

          if [ -n "$existing_id" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" -f body="$body" >/dev/null
          else
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$body"
          fi

      - name: Summarize preview
        run: |
          preview_url="${{ steps.preview.outputs.url }}"
          {
            echo '## SSH PR preview'
            echo ''
            echo "Preview URL: $preview_url"
            echo ''
            echo 'Localized roots:'
            echo "- ${preview_url}en/"
            echo "- ${preview_url}fr/"
            echo "- ${preview_url}hr/"
          } >> "$GITHUB_STEP_SUMMARY"
