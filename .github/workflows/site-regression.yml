name: Site diagnostics manual

on:
  workflow_dispatch:

jobs:
  diagnostics:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip markdown pymdown-extensions imagesize

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Node test dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build static site
        run: python tools/build.py

      - name: Expose local test root assets
        run: python tools/pages_preview_root_assets.py --preview-dir ../site-dist

      - name: Run smoke diagnostics
        run: npm run test:smoke
        continue-on-error: true

      - name: Collect Lighthouse diagnostics
        run: npm run lhci:collect
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          if-no-files-found: ignore
