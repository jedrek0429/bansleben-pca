name: Site regression harness

on:
  pull_request:
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip markdown pymdown-extensions imagesize

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node test dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build static site
        run: python tools/build.py

      - name: Prepare website preview artifact
        run: |
          rm -rf site-preview
          mkdir -p site-preview
          cp -a ../site-dist/. site-preview/
          {
            echo '## Website preview'
            echo ''
            echo 'The built static site is attached to this workflow run as the `site-preview` artifact.'
            echo ''
            echo 'To preview locally:'
            echo ''
            echo '```sh'
            echo 'unzip site-preview.zip -d site-preview'
            echo 'python -m http.server 8080 --directory site-preview'
            echo '```'
            echo ''
            echo 'Then open `http://127.0.0.1:8080/en/`, `/fr/`, or `/hr/`.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload website preview
        uses: actions/upload-artifact@v4
        with:
          name: site-preview
          path: site-preview
          if-no-files-found: error
          retention-days: 14

      - name: Run smoke regression tests
        run: npm run test:smoke

      - name: Collect Lighthouse reports
        run: npm run lhci:collect
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          if-no-files-found: ignore
