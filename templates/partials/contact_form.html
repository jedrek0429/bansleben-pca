<section class="pca-contact-section pca-section">
  <div class="container pca-contact">
    <h1 class="pca-contact__title">{{page.title}}</h1>
    <div class="pca-contact__message" aria-live="polite"></div>

    <form class="static_contact_form pca-form" method="post" action="{{contact_action}}">
      <div class="pca-form__row">
        <p class="pca-form__field pca-form__field--half">
          <label for="static_contact_name" class="pca-form__label">{{contact_form.name_label}}</label>
          <input type="text" id="static_contact_name" class="pca-form__input" name="name" placeholder="{{form.name}}" required>
        </p>

        <p class="pca-form__field pca-form__field--half">
          <label for="static_contact_email" class="pca-form__label">{{contact_form.email_label}}</label>
          <input type="email" id="static_contact_email" class="pca-form__input" name="email" placeholder="{{form.email}}" required>
        </p>
      </div>

      <p class="pca-form__field">
        <label for="static_contact_message" class="pca-form__label">{{contact_form.message_label}}</label>
        <textarea id="static_contact_message" class="pca-form__input pca-form__textarea" name="message" placeholder="{{form.message}}" required></textarea>
      </p>

      <input type="hidden" name="lang" value="{{lang}}">
      <input type="hidden" name="back_url" value="{{page.url}}">
      <input type="hidden" name="page" value="{{page.url}}">
      <input type="text" name="website" autocomplete="off" tabindex="-1" aria-hidden="true" class="pca-form__trap">

      <div class="pca-form__actions">
        <button type="submit" class="pca-button">{{form.send}}</button>
      </div>
    </form>
  </div>
</section>
