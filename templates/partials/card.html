<article class="pca-card">
  <a class="pca-card__image-link" href="{{card.href}}" aria-label="{{card.title}}">
    <img src="{{card.image_src}}"
      alt="{{card.image_alt}}"
      title="{{card.image_title}}"
      width="{{card.image_width}}"
      height="{{card.image_height}}"
      {{card.srcset}}
      data-fallback-src="{{card.fallback_src}}"
      decoding="async"
      fetchpriority="{{card.fetchpriority}}"
      loading="{{card.loading}}"
      class="pca-card__image">
  </a>
  <div class="pca-card__body">
    <h3 class="pca-card__title"><strong>{{card.title}}</strong></h3>
    <a class="pca-button pca-card__button" href="{{card.href}}">{{card.read_more}}<span class="pca-visually-hidden">: {{card.title}}</span></a>
  </div>
</article>
