<header id="main-header" class="site-header">
  <div class="container site-header__inner">
    <div class="site-logo">
      <a href="{{url_prefix}}/" class="site-logo__link" aria-label="{{site_name}}">
        <picture>
          <source srcset="{{url_prefix}}{{brand.logo_webp_src}}" type="image/webp">
          <img src="{{brand.logo_src}}" alt="{{brand.logo_alt}}" width="{{brand.logo_width}}"
            height="{{brand.logo_height}}" id="logo" class="site-logo__image">
        </picture>
      </a>
    </div>

    <nav id="top-menu-nav" class="site-nav" aria-label="Primary navigation">
      <ul id="top-menu" class="nav-menu">
{{main_menu}}
      </ul>
    </nav>

    <div id="site-mobile-nav" class="site-mobile-nav">
      <div class="pca-mobile-nav closed">
        <span class="select_page">{{common.select_page}}</span>
        <button class="pca-mobile-menu-toggle" type="button" aria-label="{{common.select_page}}" aria-expanded="false"></button>
        <ul id="pca-mobile-menu" class="pca-mobile-menu">
{{mobile_menu}}
        </ul>
      </div>
    </div>
  </div>
</header>
