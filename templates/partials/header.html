<header id="main-header" data-height-onload="96" data-fixed-height-onload="0">
  <div class="container clearfix et_menu_container">
    <div class="logo_container">
      <span class="logo_helper"></span>
      <a href="{{lang_prefix}}/">
        <picture>
          <source srcset="{{url_prefix}}{{brand.logo_webp_src}}" type="image/webp">
          <img src="{{brand.logo_src}}" alt="{{brand.logo_alt}}" width="{{brand.logo_width}}" 
             height="{{brand.logo_height}}" id="logo" data-height-percentage="79" data-actual-width="360" data-actual-height="150">
        </picture>
      </a>
    </div>

    <div id="et-top-navigation" data-height="81" data-fixed-height="40" style="padding-left: 212px;">
      <nav id="top-menu-nav">
        <ul id="top-menu" class="nav">
{{main_menu}}
        </ul>
      </nav>

      <div id="et_mobile_nav_menu">
        <div class="mobile_nav closed">
          <span class="select_page">{{common.select_page}}</span>
          <span class="mobile_menu_bar mobile_menu_bar_toggle"></span>
          <ul id="mobile_menu" class="et_mobile_menu">
{{mobile_menu}}
          </ul>
        </div>
      </div>
    </div>
  </div>
</header>
