  <style id="pca-simplified-css">
    /* Shared card layouts */
    .v2-card-row,
    .pca-card-section .et_pb_row {
      display: flex;
      align-items: stretch;
      flex-wrap: wrap;
    }

    .v2-card-col,
    .pca-card-section .pca-card {
      display: flex;
      flex-direction: column;
      margin-bottom: 30px;
    }

    .v2-card-col .v2-card-text,
    .pca-card-section .pca-card-title {
      flex: 1 1 auto;
    }

    .v2-card-col .v2-card-button-wrap,
    .pca-card-section .pca-card-button {
      margin-top: auto !important;
    }

    .v2-card-col .et_pb_text_inner p:empty,
    .v2-card-col .et_pb_text_inner pre:empty {
      display: none !important;
    }

    .pca-article-section .et_pb_text_inner,
    .pca-intro-section .et_pb_text_inner {
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .static-form-message {
      margin-bottom: 20px;
      padding: 14px;
      background: #f7f9fc;
    }

    .pca-card-section .pca-card-image,
    .pca-card-section .pca-card-title,
    .pca-card-section .pca-card-title h3,
    .pca-card-section .pca-card-button {
      text-align: center;
    }

    .pca-card-section .pca-card-image {
      margin-bottom: 0;
    }

    .pca-card-section .pca-card-image img {
      width: auto;
      max-width: 100%;
      height: auto;
    }

    .pca-card-section .pca-card-title {
      margin-bottom: 20px;
    }

    /* Fixed Divi-style header */
    body.et_fixed_nav #page-container {
      padding-top: 87px;
    }

    #main-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 87px;
      z-index: 99999;
      overflow: visible;
      transition: height .25s ease, box-shadow .25s ease;
    }

    #main-header.et-fixed-header {
      height: 54px;
      box-shadow: 0 0 7px rgba(0, 0, 0, .1);
    }

    #main-header .container.et_menu_container {
      position: relative;
      height: 100%;
      box-sizing: border-box;
    }

    #main-header .logo_container {
      position: absolute;
      top: 0;
      left: 0;
      width: auto;
      height: 100%;
    }

    #main-header .logo_helper,
    #main-header #logo {
      display: inline-block;
      vertical-align: middle;
    }

    #main-header .logo_helper {
      height: 100%;
    }

    #main-header #logo {
      width: auto !important;
      max-width: 360px !important;
      max-height: 79% !important;
      transition: max-height .25s ease;
    }

    #main-header.et-fixed-header #logo {
      max-height: 74% !important;
    }

    #et-top-navigation {
      float: right;
      display: block;
      height: auto !important;
      max-width: 100%;
      padding-top: 33px !important;
      padding-left: 212px !important;
      transition: padding-top .25s ease;
    }

    #main-header.et-fixed-header #et-top-navigation {
      padding-top: 18px !important;
    }

    #top-menu {
      display: block;
      margin: 0;
      padding: 0;
      white-space: nowrap;
    }

    #top-menu>li {
      display: inline-block;
      padding-right: 22px;
      vertical-align: top;
      white-space: nowrap;
    }

    #top-menu>li>a {
      display: block;
      padding-bottom: 33px;
      line-height: 1.25;
      white-space: nowrap;
    }

    #et_mobile_nav_menu {
      display: none !important;
    }

    /* JS-controlled desktop state. This overrides Divi's fixed 980px breakpoint. */
    html.js #main-header.pca-desktop-nav-active #top-menu-nav {
      display: block !important;
    }

    html.js #main-header.pca-desktop-nav-active #et_mobile_nav_menu {
      display: none !important;
    }

    html.js #main-header.pca-desktop-nav-active #et-top-navigation {
      float: right;
      width: auto !important;
      max-width: none !important;
      overflow: visible !important;
      padding-top: 33px !important;
      padding-left: 212px !important;
    }

    html.js #main-header.pca-desktop-nav-active.et-fixed-header #et-top-navigation {
      padding-top: 18px !important;
    }

    /* Added by JS as soon as the desktop menu no longer fits. */
    body.pca-mobile-nav-active.et_fixed_nav #page-container {
      padding-top: 81px;
    }

    #main-header.pca-mobile-nav-active,
    #main-header.pca-mobile-nav-active.et-fixed-header {
      height: 81px !important;
    }

    #main-header.pca-mobile-nav-active .logo_container {
      right: 70px;
      max-width: calc(100% - 70px);
      overflow: hidden;
    }

    #main-header.pca-mobile-nav-active #logo,
    #main-header.pca-mobile-nav-active.et-fixed-header #logo {
      max-width: 100% !important;
      max-height: 68px !important;
    }

    #main-header.pca-mobile-nav-active #top-menu-nav {
      display: none !important;
    }

    #main-header.pca-mobile-nav-active #et_mobile_nav_menu {
      display: block !important;
    }

    #main-header.pca-mobile-nav-active #et-top-navigation,
    #main-header.pca-mobile-nav-active.et-fixed-header #et-top-navigation {
      float: right;
      display: block;
      max-width: 70px;
      padding-top: 24px !important;
      padding-left: 0 !important;
      transition: none !important;
    }

    #main-header.pca-mobile-nav-active .mobile_menu_bar {
      position: relative;
      z-index: 100001;
      cursor: pointer;
    }

    #main-header.pca-mobile-nav-active .mobile_menu_bar:before {
      content: "\61";
      font-family: ETmodules !important;
      font-size: 32px;
      line-height: 1;
    }

    #main-header #mobile_menu {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 99998;
      display: block !important;
      box-sizing: border-box;
      width: 100%;
      max-width: 100vw;
      max-height: 0;
      padding: 0 5%;
      overflow: hidden;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      background: #fff;
      border-top: 3px solid #317041;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .15);
      transform: translateY(-8px);
      transition: max-height .28s ease, padding .28s ease, opacity .22s ease, transform .22s ease, visibility 0s linear .28s;
    }

    #main-header .mobile_nav.opened #mobile_menu {
      max-height: calc(100vh - 81px);
      padding: 5%;
      overflow-y: auto;
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
      transition-delay: 0s;
    }

    #mobile_menu li,
    #mobile_menu li a {
      display: block;
    }

    #mobile_menu li a {
      padding: 10px 5%;
      overflow-wrap: anywhere;
    }

    @media (max-width: 980px) {

      .v2-card-row,
      .v2-card-col,
      .pca-card-section .et_pb_row,
      .pca-card-section .pca-card {
        display: block;
      }
    }

    /* No-JS fallback only. With JS enabled, the breakpoint is measured dynamically. */
    @media (max-width: 980px) {
      html:not(.js) body.et_fixed_nav #page-container {
        padding-top: 81px;
      }

      html:not(.js) #main-header,
      html:not(.js) #main-header.et-fixed-header {
        height: 81px !important;
      }

      html:not(.js) #main-header .logo_container {
        right: 70px;
        max-width: calc(100% - 70px);
        overflow: hidden;
      }

      html:not(.js) #main-header #logo,
      html:not(.js) #main-header.et-fixed-header #logo {
        max-width: 100% !important;
        max-height: 68px !important;
      }

      html:not(.js) #top-menu-nav {
        display: none !important;
      }

      html:not(.js) #et_mobile_nav_menu {
        display: block !important;
      }

      html:not(.js) #et-top-navigation,
      html:not(.js) #main-header.et-fixed-header #et-top-navigation {
        float: right;
        display: block;
        max-width: 70px;
        padding-top: 24px !important;
        padding-left: 0 !important;
      }

      html:not(.js) .mobile_menu_bar {
        position: relative;
        z-index: 100001;
        cursor: pointer;
      }

      html:not(.js) .mobile_menu_bar:before {
        content: "\61";
        font-family: ETmodules !important;
        font-size: 32px;
        line-height: 1;
      }

      html:not(.js) #main-header,
      html:not(.js) #main-header.et-fixed-header,
      html:not(.js) #main-header .logo_container,
      html:not(.js) #main-header #logo,
      html:not(.js) #et-top-navigation,
      html:not(.js) #main-header.et-fixed-header #et-top-navigation,
      html:not(.js) .mobile_menu_bar,
      html:not(.js) #et_mobile_nav_menu {
        transition: none !important;
      }
    }

    /* Hidden measuring state used by JS. It prevents flicker while checking if the desktop menu fits. */
    body.pca-measuring-nav #main-header #top-menu-nav {
      display: block !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }

    body.pca-measuring-nav #main-header #et_mobile_nav_menu {
      display: none !important;
    }

    body.pca-measuring-nav #main-header #et-top-navigation {
      float: right !important;
      width: auto !important;
      max-width: none !important;
      overflow: visible !important;
      padding-top: 33px !important;
      padding-left: 212px !important;
    }

    body.pca-measuring-nav #main-header.et-fixed-header #et-top-navigation {
      padding-top: 18px !important;
    }

    body.pca-measuring-nav #main-header #top-menu {
      white-space: nowrap !important;
    }

    /* 404 not found */
    .pca-not-found h1 {
      color: #555 !important;
    }
  </style>

</head>

  <script id="pca-static-contact-guard">
    (function () {
      function isStaticContactForm(form) {
        return !!(form && form.classList && form.classList.contains('static_contact_form'));
      }

      // This page keeps Divi's JavaScript for navbar/animations, but this one form
      // is handled by /v2/contact.php. Stop Divi's delegated contact-form handlers
      // from receiving the submit/click event while still allowing the browser's
      // normal form POST to continue.
      document.addEventListener('submit', function (event) {
        if (isStaticContactForm(event.target)) {
          event.stopImmediatePropagation();
        }
      }, true);

      document.addEventListener('click', function (event) {
        var button = event.target && event.target.closest ? event.target.closest('button, input[type="submit"]') : null;
        if (button && isStaticContactForm(button.form)) {
          event.stopImmediatePropagation();
        }
      }, true);
    })();
  </script>

  <script defer src="/wp-content/themes/Divi/js/custom.unified.js?ver=4.9.1" id="divi-custom-script-js"></script>
  <script async src="/wp-content/themes/Divi/core/admin/js/common.js?ver=4.9.1" id="et-core-common-js"></script>

  <script id="pca-custom-js">
    (function () {
      function onReady(callback) {
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', callback);
        } else {
          callback();
        }
      }

      function debounceFrame(callback) {
        var frame = null;

        return function () {
          if (frame) window.cancelAnimationFrame(frame);
          frame = window.requestAnimationFrame(function () {
            frame = null;
            callback();
          });
        };
      }

      function initHeader() {
        var body = document.body;
        var header = document.getElementById('main-header');
        if (!header) return;

        var container = header.querySelector('.container.et_menu_container') || header;
        var logo = header.querySelector('.logo_container');
        var topMenu = header.querySelector('#top-menu');
        var topMenuNav = header.querySelector('#top-menu-nav');
        var mobileNav = header.querySelector('#et_mobile_nav_menu');

        function updateFixedHeader() {
          header.classList.toggle('et-fixed-header', window.scrollY > 10);
        }

        function visibleMenuItems() {
          if (!topMenu) return [];

          return Array.prototype.slice.call(topMenu.children).filter(function (item) {
            return item.offsetWidth || item.offsetHeight;
          });
        }

        function menuItemsWrap(items) {
          items = items || visibleMenuItems();
          if (items.length < 2) return false;

          var firstTop = items[0].getBoundingClientRect().top;
          return items.some(function (item) {
            return Math.abs(item.getBoundingClientRect().top - firstTop) > 2;
          });
        }

        function menuItemsWidth(items) {
          return items.reduce(function (total, item) {
            return total + item.getBoundingClientRect().width;
          }, 0);
        }

        function closeMobileMenu() {
          header.querySelectorAll('.mobile_nav.opened').forEach(function (nav) {
            nav.classList.remove('opened');
            nav.classList.add('closed');
          });
        }

        function setResponsiveNav(useMobile) {
          header.classList.toggle('pca-mobile-nav-active', useMobile);
          header.classList.toggle('pca-desktop-nav-active', !useMobile);
          body.classList.toggle('pca-mobile-nav-active', useMobile);

          if (!useMobile) closeMobileMenu();
        }

        function desktopMenuDoesNotFit() {
          if (!topMenu || !topMenuNav || !mobileNav) return false;

          /* Measure from a neutral desktop state, not from the current mobile/desktop state. */
          body.classList.add('pca-measuring-nav');
          header.classList.remove('pca-mobile-nav-active', 'pca-desktop-nav-active');
          body.classList.remove('pca-mobile-nav-active');

          var containerBox = container.getBoundingClientRect();
          var logoBox = logo ? logo.getBoundingClientRect() : { right: containerBox.left, width: 0 };
          var menuBox = topMenu.getBoundingClientRect();
          var items = visibleMenuItems();
          var safeGap = 16;
          var reservedLeft = Math.max(212, logoBox.width + safeGap);
          var menuWidth = Math.max(menuItemsWidth(items), topMenu.scrollWidth || 0);
          var fitsAvailableWidth = reservedLeft + menuWidth <= containerBox.width + 1;
          var fitsRight = menuBox.right <= containerBox.right + 1;
          var fitsLeft = menuBox.left >= logoBox.right + safeGap;
          var fitsOneLine = !menuItemsWrap(items);

          body.classList.remove('pca-measuring-nav');

          return !(fitsAvailableWidth && fitsRight && fitsLeft && fitsOneLine);
        }

        function updateResponsiveNav() {
          updateFixedHeader();
          setResponsiveNav(desktopMenuDoesNotFit());
        }

        var refreshResponsiveNav = debounceFrame(updateResponsiveNav);

        document.querySelectorAll('.mobile_menu_bar_toggle').forEach(function (toggle) {
          toggle.addEventListener('click', function (event) {
            var nav = toggle.closest('.mobile_nav');
            if (!nav) return;

            event.preventDefault();
            event.stopPropagation();

            var shouldOpen = !nav.classList.contains('opened');
            nav.classList.toggle('opened', shouldOpen);
            nav.classList.toggle('closed', !shouldOpen);
          });
        });

        updateResponsiveNav();
        window.addEventListener('scroll', updateFixedHeader, { passive: true });
        window.addEventListener('resize', refreshResponsiveNav, { passive: true });
        window.addEventListener('orientationchange', refreshResponsiveNav);
        window.addEventListener('load', refreshResponsiveNav);

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(refreshResponsiveNav);
        }

        if (window.ResizeObserver) {
          new ResizeObserver(refreshResponsiveNav).observe(container);
        }
      }

      function showStaticFormMessage() {
        var sent = new URLSearchParams(location.search).get('sent');
        if (sent !== '1' && sent !== '0') return;

        document.querySelectorAll('form.static_contact_form').forEach(function (form) {
          var container = form.closest('.et_pb_contact_form_container');
          var diviMessage = container ? container.querySelector('.et-pb-contact-message') : null;

          // Keep Divi's message box empty so we only show one message.
          if (diviMessage) {
            diviMessage.textContent = '';
            diviMessage.style.display = '';
          }

          if (form.querySelector('.static-form-message')) return;

          var message = document.createElement('div');
          message.className = 'static-form-message';
          message.textContent = sent === '1' ? '{{form.success}}' : '{{form.error}}';

          form.insertBefore(message, form.firstChild);
        });
      }

      onReady(function () {
        initHeader();
        showStaticFormMessage();
      });
    })();
  </script>
